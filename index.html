<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0c0e">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7fb">
<link rel="manifest" href="manifest.webmanifest">
<title>Mike Lowen — Portfolio</title>
<style>
  :root{ --bg:#0c0c0e; --fg:#ffffff; --muted:#b8b8bd; --card:#141418; --accent:#0a84ff; }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f7f7fb; --fg:#0d0d10; --muted:#55565e; --card:#ffffff; --accent:#0a84ff; }
  }
  *{ box-sizing:border-box }
  html{ background:var(--bg); }

  body{
    margin:0;
    background:var(--bg); color:var(--fg);
    font:16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, system-ui;
    -webkit-font-smoothing:antialiased; line-height:1.45;

    min-height:100svh;
    padding:24px;
    padding-top:calc(24px + env(safe-area-inset-top));
    padding-left: max(24px, env(safe-area-inset-left));
    padding-right: max(24px, env(safe-area-inset-right));

    display:flex;
    justify-content:flex-start;   /* mobile: left-aligned */
    align-items:center;
  }
  .wrap{
    width:100%; max-width:480px; background:var(--card);
    border:1px solid rgba(128,128,160,.14); border-radius:20px;
    padding:28px 22px; box-shadow:0 10px 30px rgba(0,0,0,.25);
    margin-top:8px;
  }
  header{ display:flex; align-items:center; gap:16px; }
  .pfp{
    width:96px; height:96px; border-radius:50%; overflow:hidden; flex:0 0 auto;
    border:2px solid rgba(255,255,255,.12); box-shadow:0 4px 14px rgba(0,0,0,.25);
    background:#222; position:relative;
  }
  .pfp img{ width:100%; height:100%; object-fit:cover; display:block; }
  h1{ margin:0 0 4px; font-size:28px; letter-spacing:.2px }
  .tag{ color:var(--muted); font-size:14px }
  main{ margin-top:18px; }
  .chip{
    display:inline-block; padding:8px 12px; border-radius:999px; border:1px solid rgba(128,128,160,.2);
    margin:4px 6px 0 0; font-size:13px; color:var(--muted);
  }
  footer{ margin-top:22px; font-size:12px; color:var(--muted); text-align:center; opacity:.9; }

  /* Toast */
  .toast {
    display:none; 
    position:fixed; 
    left:50%; 
    bottom:20px; 
    transform:translateX(-50%);
    background:var(--card); 
    border:1px solid rgba(128,128,160,.25);
    padding:10px 12px; 
    border-radius:12px; 
    gap:10px; 
    align-items:center; 
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    z-index: 10;
  }
  .toast button { 
    border:1px solid rgba(128,128,160,.25); 
    border-radius:10px; 
    padding:6px 10px; 
    background:transparent; 
    color:var(--fg);
  }

  /* --- Responsive layout & sizing --- */

  /* ≥ 768px: tablets / small laptops */
  @media (min-width: 768px) {
    body{
      justify-content: center;     /* center horizontally */
      align-items: flex-start;     /* keep it near the top */
      padding-top: 8vh;            /* nicer top spacing */
    }
    .wrap{
      width: min(92vw, 720px);
      padding: 32px 26px;
      border-radius: 24px;
      box-shadow: 0 14px 40px rgba(0,0,0,.22);
    }
    .pfp{ width:108px; height:108px; }
    h1{ font-size: clamp(28px, 3.2vw, 36px); letter-spacing:.1px; }
    .tag{ font-size:15px; }
    .chip{ font-size:14px; padding:9px 13px; }
    footer{ font-size:13px; margin-top:28px; }
  }

  /* ≥ 1200px: desktops */
  @media (min-width: 1200px) {
    body{ padding-top: 10vh; }
    .wrap{
      width: min(70vw, 820px);
      padding: 36px 30px;
      border-radius: 26px;
    }
    .pfp{ width:120px; height:120px; }
    h1{ font-size: clamp(34px, 2.6vw, 44px); }
    .chip{ font-size:15px; padding:10px 14px; }
  }

  /* ≤ 360px: extra-small phones */
  @media (max-width: 360px) {
    .wrap{
      padding: 22px 16px;
      border-radius: 18px;
    }
    .pfp{ width:80px; height:80px; }
    h1{ font-size: 24px; }
    .chip{ font-size:12px; padding:6px 10px; }
  }

  /* ≥ 800px height: tall phones (better top spacing) */
  @media (min-height: 800px) and (max-width: 767px) {
    body{ align-items: flex-start; padding-top: 12vh; }
  }
</style>

      <div>

      </div>

    <main>

      <span class="chip">VR/AR</span>

  </div>
